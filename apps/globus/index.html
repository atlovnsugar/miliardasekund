<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Globus — Interaktivní vizualizace dat</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>
  <div class="bg-animation"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>

  <div class="container">
    <a href="../../index.html" class="back-link">← Zpět na přehled</a>

    <header>
      <div class="logo">🌍</div>
      <h1>Interaktivní 3D Globus</h1>
      <p>Prozkoumejte svět, vizualizujte data, porovnávejte roky a sledujte změny v čase.</p>
    </header>

    <div class="globe-container">
      <div class="view-toggle">
        <button class="view-btn active" data-view="globe" onclick="switchView('globe')">🌐 3D Globus</button>
        <button class="view-btn" data-view="map" onclick="switchView('map')">🗺️ Politická mapa</button>
      </div>

      <div class="canvas-wrapper">
        <div id="globeCanvas"></div>
        <div id="mapContainer"></div>
        <!-- FIX 3 + FIX 6: Tooltip moved outside canvas-wrapper, uses fixed positioning -->
        <div class="loading-overlay" id="loadingOverlay">
          <div class="spinner"></div>
          <div>Načítám data...</div>
        </div>
      </div>

      <!-- Tooltip globally in body for proper fixed positioning -->
      <div class="tooltip" id="tooltip">
        <button class="close-btn" onclick="unpinTooltip()" title="Zavřít">×</button>
      </div>

      <div class="controls-panel">
        <div class="control-group">
          <label for="variableSelect">📊 Proměnná</label>
          <select id="variableSelect" onchange="updateVisualization()"></select>
        </div>

        <div class="control-group">
          <label for="colorScale">🎨 Barevná škála</label>
          <select id="colorScale" onchange="updateVisualization()">
            <option value="blue">Modrá → Červená</option>
            <option value="green">Zelená → Fialová</option>
            <option value="orange">Žlutá → Oranžová</option>
            <option value="gray">Šedá</option>
          </select>
          <div class="color-scale-preview"><div class="color-bar" id="colorBar"></div></div>
          <div class="color-labels"><span id="colorMin">—</span><span id="colorMax">—</span></div>
        </div>

        <div class="control-group">
          <label>📅 Rok / Porovnání</label>
          <!-- FIX 5: Single year selector (always visible when not in compare mode) -->
          <div class="year-single-row" id="yearSingleRow">
            <label for="yearSingle">Rok:</label>
            <select id="yearSingle" onchange="updateVisualization()"></select>
          </div>
          <label class="checkbox-group" style="margin-top:8px;">
            <input type="checkbox" id="compareMode" onchange="toggleCompareMode()"> Porovnání mezi roky
          </label>
          <div class="year-selector-row" id="yearSelectors" style="display:none;">
            <select id="yearFrom" onchange="updateVisualization()"></select>
            <span style="color:var(--text-muted);align-self:center;">→</span>
            <select id="yearTo" onchange="updateVisualization()"></select>
          </div>
        </div>

        <div class="control-group">
          <label>⚙️ Nastavení</label>
          <label class="checkbox-group"><input type="checkbox" id="autoRotate" checked onchange="toggleAutoRotate()"> Auto-rotace</label>
          <label class="checkbox-group"><input type="checkbox" id="showLabels" checked onchange="updateVisualization()"> Popisky na globu</label>
        </div>
      </div>

      <div class="status-bar"><div class="status-dot" id="statusDot"></div><span id="statusText">Načítám...</span></div>
      <div class="legend" id="legend"></div>
    </div>
  </div>

  <footer><p>Data: Světová banka, Natural Earth · Vytvořeno s ❤️</p></footer>

  <script>
    // ===== DEFAULT DATA =====
    const DEFAULT_DATA = {
      population: {
        CZE:{2000:10.2,2005:10.3,2010:10.5,2015:10.6,2020:10.7,2023:10.8},
        SVK:{2000:5.4,2005:5.4,2010:5.4,2015:5.4,2020:5.5,2023:5.5},
        DEU:{2000:82.2,2005:82.4,2010:81.8,2015:82.2,2020:83.2,2023:84.4},
        POL:{2000:38.3,2005:38.2,2010:38.0,2015:38.0,2020:37.8,2023:37.7},
        USA:{2000:282,2005:295,2010:309,2015:321,2020:331,2023:335},
        CHN:{2000:1267,2005:1303,2010:1338,2015:1371,2020:1402,2023:1411},
        IND:{2000:1053,2005:1133,2010:1234,2015:1310,2020:1380,2023:1428},
        BRA:{2000:174,2005:186,2010:196,2015:205,2020:213,2023:216},
        RUS:{2000:146,2005:143,2010:143,2015:144,2020:145,2023:144},
        JPN:{2000:127,2005:127,2010:128,2015:127,2020:126,2023:124},
        GBR:{2000:59,2005:60,2010:62,2015:65,2020:67,2023:68},
        FRA:{2000:61,2005:63,2010:65,2015:67,2020:68,2023:68},
        ITA:{2000:57,2005:58,2010:60,2015:60,2020:60,2023:59},
        ESP:{2000:40,2005:44,2010:46,2015:46,2020:47,2023:48}
      },
      gdp: {
        CZE:{2000:65,2005:117,2010:199,2015:180,2020:246,2023:323},
        SVK:{2000:24,2005:49,2010:89,2015:88,2020:105,2023:134},
        DEU:{2000:1950,2005:2850,2010:3400,2015:3360,2020:3890,2023:4460},
        POL:{2000:170,2005:285,2010:465,2015:476,2020:600,2023:811},
        USA:{2000:10250,2005:13040,2010:14990,2015:18220,2020:21060,2023:27360},
        CHN:{2000:1210,2005:2290,2010:6090,2015:11060,2020:14690,2023:17960},
        IND:{2000:477,2005:820,2010:1660,2015:2090,2020:2660,2023:3730},
        BRA:{2000:655,2005:882,2010:2210,2015:1800,2020:1450,2023:2130},
        RUS:{2000:260,2005:764,2010:1524,2015:1363,2020:1483,2023:2240},
        JPN:{2000:4888,2005:4755,2010:5759,2015:4444,2020:4975,2023:4410},
        GBR:{2000:1653,2005:2500,2010:2490,2015:2889,2020:2710,2023:3090},
        FRA:{2000:1366,2005:2196,2010:2647,2015:2422,2020:2630,2023:3010}
      },
      area: {
        CZE:78.9,SVK:49.0,DEU:357.1,POL:312.7,USA:9833.5,CHN:9596.9,
        IND:3287.3,BRA:8515.8,RUS:17098.2,JPN:377.9,GBR:242.5,FRA:551.7,ITA:301.3,ESP:505.9
      },
      lifeExpectancy: {
        CZE:{2000:75.2,2005:76.3,2010:77.5,2015:78.7,2020:77.9,2023:79.0},
        SVK:{2000:73.5,2005:74.2,2010:75.4,2015:76.3,2020:75.1,2023:76.0},
        DEU:{2000:77.7,2005:79.0,2010:80.2,2015:80.7,2020:81.1,2023:81.0},
        USA:{2000:76.8,2005:77.4,2010:78.6,2015:78.7,2020:77.0,2023:77.5},
        CHN:{2000:71.4,2005:72.5,2010:74.8,2015:76.1,2020:77.3,2023:78.2},
        JPN:{2000:81.1,2005:82.0,2010:82.9,2015:83.7,2020:84.3,2023:84.3},
        BRA:{2000:69.8,2005:71.4,2010:73.2,2015:74.5,2020:73.9,2023:74.7},
        IND:{2000:62.5,2005:64.4,2010:66.0,2015:68.3,2020:70.0,2023:70.9}
      }
    };

    let WORLD_DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));

    const NAME_TO_CODE = {
      "Czechia":"CZE","Czech Republic":"CZE","Slovakia":"SVK","Germany":"DEU","Poland":"POL",
      "United States of America":"USA","United States":"USA","China":"CHN","India":"IND",
      "Brazil":"BRA","Russia":"RUS","Russian Federation":"RUS","Japan":"JPN",
      "United Kingdom":"GBR","France":"FRA","Italy":"ITA","Spain":"ESP"
    };

    const CONFIG = {
      globeRadius: 100, rotationSpeed: 0.0012, autoRotatePauseTime: 3000,
      colors: {
        blue:   ['#0d47a1','#1976d2','#42a5f5','#90caf9','#e1f5fe','#fff9c4','#ffb74d','#ff9800','#e65100','#b71c1c'],
        green:  ['#1b5e20','#2e7d32','#43a047','#66bb6a','#a5d6a7','#fff9c4','#ffb74d','#ff9800','#e65100','#880e4f'],
        orange: ['#fff9c4','#fff59d','#fff176','#ffee58','#ffe082','#ffb74d','#ff9800','#f57c00','#e65100','#b71c1c'],
        gray:   ['#fafafa','#f5f5f5','#e0e0e0','#bdbdbd','#9e9e9e','#757575','#616161','#424242','#212121','#000000']
      }
    };

    let scene, camera, renderer, controls, globe, globeTexture, globeTextureCanvas, ctx;
    let geoData = null, currentView = 'globe', autoRotate = true, showLabels = true;
    let currentVariable = 'population', currentColorScale = 'blue', isCompareMode = false;
    let lastInteraction = 0, animationId = null;
    let raycaster, mouse;
    let mapSvg, mapG, mapProjection, mapPath;
    let tooltipPinned = false;
    let tooltipCountryProps = null;

    document.addEventListener('DOMContentLoaded', init);

    async function init() {
      try {
        updateStatus('Načítám mapová data...', 'loading');
        const geoRes = await fetch('https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson');
        if (!geoRes.ok) throw new Error('GeoJSON chyba');
        geoData = await geoRes.json();
        geoData.features.forEach(f => {
          f.properties.code = NAME_TO_CODE[f.properties.name] || f.properties.name.substring(0,3).toUpperCase();
        });

        await loadExternalData();
        populateVariableDropdown();
        populateYearSelectors();

        initGlobe();
        initMap();
        updateVisualization();

        updateStatus('Připraveno', 'ready');
        document.getElementById('loadingOverlay').classList.add('hidden');
        animate();
      } catch (err) {
        console.error('Init error:', err);
        showError('Nepodařilo se načíst data. Zkontrolujte připojení.');
      }
    }

    async function loadExternalData() {
      try {
        const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
        const paths = ['./data.json', 'data.json', baseUrl + 'data.json'];
        for (const path of paths) {
          try {
            const res = await fetch(path, { cache: 'no-store' });
            if (res.ok) {
              const ext = await res.json();
              Object.keys(ext).forEach(k => { WORLD_DATA[k] = { ...(WORLD_DATA[k]||{}), ...ext[k] }; });
              break;
            }
          } catch(e) { /* continue */ }
        }
      } catch(e) { console.error('loadExternalData error:', e); }
    }

    function populateVariableDropdown() {
      const sel = document.getElementById('variableSelect');
      sel.innerHTML = '';
      const labels = {
        population:'Počet obyvatel', gdp:'HDP (mld. USD)',
        area:'Rozloha (tis. km²)', lifeExpectancy:'Naděje dožití (roky)'
      };
      Object.keys(WORLD_DATA).forEach(k => {
        const opt = document.createElement('option');
        opt.value = k;
        opt.textContent = labels[k] || k.replace(/([A-Z])/g,' $1').replace(/^./,s=>s.toUpperCase()).trim();
        if(k === currentVariable) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    // FIX 5: Populate single year selector + compare selectors
    function populateYearSelectors() {
      const years = new Set();
      Object.values(WORLD_DATA).forEach(v => {
        Object.values(v).forEach(yr => {
          if (typeof yr === 'object' && yr !== null) Object.keys(yr).forEach(y => years.add(+y));
        });
      });
      const sorted = Array.from(years).sort((a,b) => a-b);
      if(!sorted.length) sorted.push(...[2000,2005,2010,2015,2020,2023]);

      const single = document.getElementById('yearSingle');
      const from = document.getElementById('yearFrom');
      const to = document.getElementById('yearTo');
      single.innerHTML = from.innerHTML = to.innerHTML = '';

      sorted.forEach(y => {
        single.innerHTML += `<option value="${y}" ${y===2023?'selected':''}>${y}</option>`;
        from.innerHTML += `<option value="${y}" ${y===2010?'selected':''}>${y}</option>`;
        to.innerHTML += `<option value="${y}" ${y===2023?'selected':''}>${y}</option>`;
      });
    }

    function updateStatus(text, type) {
      document.getElementById('statusText').textContent = text;
      const d = document.getElementById('statusDot');
      d.className = 'status-dot';
      if(type==='loading') d.classList.add('loading');
      if(type==='error') d.classList.add('error');
    }

    function showError(msg) {
      document.getElementById('loadingOverlay').innerHTML =
        `<div class="error-message"><div style="font-size:48px;margin-bottom:12px;">⚠️</div><div>${msg}</div><button class="retry-btn" onclick="location.reload()">Zkusit znovu</button></div>`;
      updateStatus('Chyba','error');
    }

    // ===== 3D GLOBUS =====
    function initGlobe() {
      const c = document.getElementById('globeCanvas');
      const w = c.clientWidth || 800, h = c.clientHeight || 560;

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(45, w/h, 0.1, 2000);
      camera.position.z = 300;

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(w, h);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x000000, 0);
      c.appendChild(renderer.domElement);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true; controls.dampingFactor = 0.05;
      controls.minDistance = 140; controls.maxDistance = 600; controls.enablePan = false;
      controls.addEventListener('start', () => lastInteraction = Date.now());

      scene.add(new THREE.AmbientLight(0xffffff, 0.6));
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(50, 30, 50);
      scene.add(dirLight);

      const ocean = new THREE.Mesh(
        new THREE.SphereGeometry(CONFIG.globeRadius, 64, 64),
        new THREE.MeshStandardMaterial({ color: 0x0a1628, roughness: 0.9, metalness: 0.1 })
      );
      scene.add(ocean);

      // FIX 1: Increase canvas resolution to reduce seam artifacts + use ClampToEdge wrapping
      globeTextureCanvas = document.createElement('canvas');
      globeTextureCanvas.width = 4096;
      globeTextureCanvas.height = 2048;
      ctx = globeTextureCanvas.getContext('2d');

      globeTexture = new THREE.CanvasTexture(globeTextureCanvas);
      // FIX 1: Use ClampToEdgeWrapping to prevent the seam from wrapping/bleeding
      globeTexture.wrapS = THREE.RepeatWrapping;
      globeTexture.wrapT = THREE.ClampToEdgeWrapping;
      globeTexture.minFilter = THREE.LinearMipmapLinearFilter;
      globeTexture.magFilter = THREE.LinearFilter;
      globeTexture.generateMipmaps = true;
      // FIX 1: Offset UV so the seam is on the back (antimeridian) not visible when spinning
      // globeTexture.offset.set(0.5, 0);
      globeTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();
      globe = new THREE.Mesh(
        new THREE.SphereGeometry(CONFIG.globeRadius + 0.1, 128, 128),
        new THREE.MeshStandardMaterial({ map: globeTexture, transparent: true, roughness: 0.7 })
      );
      // FIX 1: Rotate globe mesh so seam lands on antimeridian (180° lon = back of globe)
      // globe.rotation.y = Math.PI;
      scene.add(globe);

      createStars();

      raycaster = new THREE.Raycaster();
      mouse = new THREE.Vector2();
      renderer.domElement.addEventListener('mousemove', onGlobeMouseMove);
      renderer.domElement.addEventListener('mouseleave', hideTooltip);

      window.addEventListener('resize', () => {
        const w2 = c.clientWidth, h2 = c.clientHeight;
        camera.aspect = w2/h2; camera.updateProjectionMatrix();
        renderer.setSize(w2, h2);
      });
    }

    function createStars() {
      const geo = new THREE.BufferGeometry();
      const positions = [];
      for(let i = 0; i < 5000; i++) {
        positions.push(
          (Math.random()-0.5)*3000,
          (Math.random()-0.5)*3000,
          (Math.random()-0.5)*3000
        );
      }
      geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
        color: 0xffffff, size: 0.8, transparent: true, opacity: 0.9, sizeAttenuation: true
      })));
    }

    function updateGlobeTexture() {
      if(!ctx || !geoData) return;

      const W = 4096, H = 2048;
      ctx.clearRect(0, 0, W, H);

      // FIX 1: Use geoEquirectangular with precise fit — draw an extra strip on both sides to fill seam
      const proj = d3.geoEquirectangular().fitSize([W, H], geoData);
      const path = d3.geoPath().projection(proj).context(ctx);

      // Fill background transparent (ocean handled by Three.js sphere)
      ctx.clearRect(0, 0, W, H);

      // Draw countries
      geoData.features.forEach(f => {
        const col = getCountryColor(f.properties.code);
        ctx.beginPath();
        ctx.fillStyle = col;
        path(f);
        ctx.fill();
      });

      // Draw borders
      ctx.strokeStyle = 'rgba(255,255,255,0.45)';
      ctx.lineWidth = 1.0;
      geoData.features.forEach(f => {
        ctx.beginPath();
        path(f);
        ctx.stroke();
      });

      // Labels
      if(showLabels) {
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#ffffff';
        ctx.shadowColor = 'rgba(0,0,0,0.95)';
        ctx.shadowBlur = 6;

        geoData.features.forEach(f => {
          const code = f.properties.code;
          const col = getCountryColor(code);
          if(col === '#374151') return;
          try {
            const center = d3.geoCentroid(f);
            const [x, y] = proj(center);
            const bounds = path.bounds(f);
            const area = (bounds[1][0]-bounds[0][0]) * (bounds[1][1]-bounds[0][1]);
            if(area > 1500000) {
              const fs = Math.max(16, Math.min(48, Math.sqrt(area)*0.008));
              ctx.font = `700 ${fs}px Segoe UI, sans-serif`;
              ctx.fillText(formatValue(getCountryValue(code, currentVariable), currentVariable), x, y);
            }
          } catch(e) {}
        });
        ctx.shadowBlur = 0;
      }

      globeTexture.needsUpdate = true;
    }

    // ===== 2D MAPA =====
    function initMap() {
      const c = document.getElementById('mapContainer');
      if (!c) return;
      c.innerHTML = '';
      const w = c.clientWidth || 800;
      const h = c.clientHeight || 560;

      if (!geoData?.features?.length) return;

      mapSvg = d3.select(c).append('svg')
        .attr('width', w).attr('height', h)
        .attr('viewBox', `0 0 ${w} ${h}`)
        .attr('preserveAspectRatio', 'xMidYMid meet')
        .style('cursor', 'grab');

      mapG = mapSvg.append('g');

      // FIX 2: Use natural earth projection (no extreme mercator distortion) with proper translate
      mapProjection = d3.geoNaturalEarth1()
        .fitSize([w * 0.95, h * 0.95], geoData)
        .translate([w / 2, h / 2]);

      mapPath = d3.geoPath().projection(mapProjection);

      // Draw countries (single copy — no infinite scroll to avoid zoom issues)
      mapG.selectAll('path.country')
        .data(geoData.features)
        .enter()
        .append('path')
        .attr('class', 'country')
        .attr('d', d => { try { return mapPath(d) || ''; } catch(e) { return ''; } })
        .attr('fill', d => getCountryColor(d.properties.code))
        .attr('stroke', 'rgba(255,255,255,0.3)')
        .attr('stroke-width', 0.8)
        .style('cursor', 'pointer')
        .on('mouseenter', function(event, d) {
          if(tooltipPinned) return;
          tooltipCountryProps = d.properties;
          showTooltipHover(event, d.properties);
          d3.select(this).raise().attr('stroke','#fff').attr('stroke-width',1.8);
        })
        .on('mousemove', function(event) {
          if(!tooltipPinned) moveTooltip(event);
        })
        .on('mouseleave', function(event, d) {
          if(!tooltipPinned) {
            // FIX 6: Small delay — check if mouse moved to tooltip
            setTimeout(() => {
              const tt = document.getElementById('tooltip');
              if(!tt.matches(':hover')) hideTooltip();
            }, 80);
          }
          d3.select(this).attr('stroke','rgba(255,255,255,0.3)').attr('stroke-width',0.8);
        })
        .on('click', function(event, d) {
          // FIX 6: Click pins the tooltip
          event.stopPropagation();
          tooltipCountryProps = d.properties;
          showTooltipPinned(event, d.properties);
          d3.select(this).raise().attr('stroke','#fff').attr('stroke-width',1.8);
        });

      // Click on empty area unpins
      mapSvg.on('click', function() {
        unpinTooltip();
      });

      // FIX 2: Proper zoom — no invalid translateExtent, proper bounds
      const zoom = d3.zoom()
        .scaleExtent([0.8, 12])
        .on('start', () => mapSvg.style('cursor','grabbing'))
        .on('zoom', (event) => {
          mapG.attr('transform', event.transform);
        })
        .on('end', () => mapSvg.style('cursor','grab'));

      mapSvg.call(zoom);

      // Double-click reset
      mapSvg.on('dblclick.zoom', null);
      mapSvg.on('dblclick', function() {
        mapSvg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
      });
    }

    // ===== DATA FUNCTIONS =====
    // FIX 5: getCountryValue respects selected single year
    function getCurrentYear() {
      if(isCompareMode) return null;
      const sel = document.getElementById('yearSingle');
      return sel ? +sel.value : null;
    }

    function getCountryValue(code, variable, yearOverride) {
      const v = WORLD_DATA[variable]?.[code];
      if(v === undefined || v === null) return null;
      if(typeof v === 'object') {
        if(yearOverride) return v[yearOverride] ?? null;
        const yr = getCurrentYear();
        if(yr) {
          // Find closest year
          const keys = Object.keys(v).map(Number).sort((a,b)=>a-b);
          if(keys.includes(yr)) return v[yr];
          // Find nearest
          let nearest = keys.reduce((a,b) => Math.abs(b-yr) < Math.abs(a-yr) ? b : a);
          return v[nearest] ?? null;
        }
        return v[Object.keys(v).slice(-1)[0]];
      }
      return v;
    }

    function getCountryColor(code) {
      if(!isCompareMode) {
        const val = getCountryValue(code, currentVariable);
        if(val === null) return '#374151';

        let vals = [];
        if(geoData) {
          geoData.features.forEach(f => {
            const v = getCountryValue(f.properties.code, currentVariable);
            if(v !== null) vals.push(v);
          });
        }
        if(!vals.length) return '#374151';

        const min = Math.min(...vals), max = Math.max(...vals);
        document.getElementById('colorMin').textContent = formatValue(min, currentVariable);
        document.getElementById('colorMax').textContent = formatValue(max, currentVariable);

        const cols = CONFIG.colors[currentColorScale];
        const t = max > min ? Math.pow((val-min)/(max-min), 0.6) : 0.5;
        const i = Math.min(Math.floor(t*(cols.length-1)), cols.length-2);
        return d3.interpolateRgb(cols[i], cols[i+1])(t*(cols.length-1)-i);
      } else {
        const y1 = document.getElementById('yearFrom').value;
        const y2 = document.getElementById('yearTo').value;
        const v1 = getCountryValue(code, currentVariable, y1);
        const v2 = getCountryValue(code, currentVariable, y2);

        if(v1 === null || v2 === null) return '#374151';
        const delta = v2 - v1;

        let maxD = 0;
        if(geoData) {
          geoData.features.forEach(f => {
            const d1 = getCountryValue(f.properties.code, currentVariable, y1);
            const d2 = getCountryValue(f.properties.code, currentVariable, y2);
            if(d1 !== null && d2 !== null) maxD = Math.max(maxD, Math.abs(d2-d1));
          });
        }
        document.getElementById('colorMin').textContent = `−${formatValue(maxD,'delta')}`;
        document.getElementById('colorMax').textContent = `+${formatValue(maxD,'delta')}`;

        if(maxD === 0) return '#64748b';
        const t = delta / maxD;
        const c = t < 0
          ? ['#fee2e2','#fca5a5','#f87171','#ef4444']
          : ['#dcfce7','#86efac','#22c55e','#15803d'];
        const i = Math.min(Math.floor(Math.abs(t)*(c.length-1)), c.length-2);
        return d3.interpolateRgb(c[i], c[i+1])(Math.abs(t)*(c.length-1)-i);
      }
    }

    function updateVisualization() {
      currentVariable = document.getElementById('variableSelect').value;
      currentColorScale = document.getElementById('colorScale').value;
      showLabels = document.getElementById('showLabels').checked;

      document.getElementById('colorBar').style.background =
        `linear-gradient(to right, ${CONFIG.colors[currentColorScale].join(', ')})`;

      updateGlobeTexture();

      if(mapG) {
        mapG.selectAll('path.country').transition().duration(250)
          .attr('fill', d => getCountryColor(d.properties.code));
      }

      // Refresh pinned tooltip
      if(tooltipPinned && tooltipCountryProps) {
        const tt = document.getElementById('tooltip');
        const fakeEvent = { clientX: parseInt(tt.style.left)+20, clientY: parseInt(tt.style.top)+20 };
        showTooltipPinned(fakeEvent, tooltipCountryProps, true);
      }

      updateLegend();
    }

    function updateLegend() {
      const l = document.getElementById('legend');
      if(isCompareMode) {
        l.innerHTML = `<span class="legend-dot" style="background:#ef4444"></span> Pokles <span class="legend-dot" style="background:#64748b"></span> Beze změny <span class="legend-dot" style="background:#22c55e"></span> Nárůst`;
      } else {
        const c = CONFIG.colors[currentColorScale];
        l.innerHTML = `<span class="legend-dot" style="background:${c[0]}"></span> Nízké <span class="legend-dot" style="background:${c[Math.floor(c.length/2)]}"></span> Střední <span class="legend-dot" style="background:${c[c.length-1]}"></span> Vysoké`;
      }
    }

    function formatValue(val, type) {
      const v = type || currentVariable;
      if(v === 'delta') {
        const a = Math.abs(val), s = val < 0 ? '−' : '+';
        if(currentVariable === 'population') return s+a.toFixed(1)+'M';
        if(currentVariable === 'gdp') return s+a.toFixed(0)+'B';
        if(currentVariable === 'lifeExpectancy') return s+a.toFixed(1)+' let';
        return s+a.toLocaleString('cs-CZ');
      }
      if(v === 'population') return val.toFixed(1)+' mil.';
      if(v === 'gdp') return val.toLocaleString('cs-CZ')+' mld.';
      if(v === 'area') return val.toFixed(0)+' tis. km²';
      if(v === 'lifeExpectancy') return val.toFixed(1)+' let';
      return typeof val === 'number' ? val.toLocaleString('cs-CZ') : val;
    }

    function getVariableLabel(k) {
      return {
        population:'👥 Obyvatelstvo', gdp:'💰 HDP', area:'📐 Rozloha', lifeExpectancy:'❤️ Dožití'
      }[k] || k;
    }

    // ===== TOOLTIP — FIX 3, FIX 4, FIX 6 =====

    // FIX 4: Build sparkline SVG for time-series data
    function buildSparklineSVG(code, variable) {
      const data = WORLD_DATA[variable]?.[code];
      if(!data || typeof data !== 'object' || Array.isArray(data)) return '';
      const entries = Object.entries(data).map(([y,v]) => ({y:+y,v:+v})).sort((a,b)=>a.y-b.y);
      if(entries.length < 2) return '';

      const W = 220, H = 48, pad = 4;
      const ys = entries.map(e=>e.v);
      const minV = Math.min(...ys), maxV = Math.max(...ys);
      const range = maxV - minV || 1;

      const sx = (i) => pad + (i/(entries.length-1)) * (W - pad*2);
      const sy = (v) => H - pad - ((v-minV)/range) * (H - pad*2);

      const pts = entries.map((e,i) => `${sx(i).toFixed(1)},${sy(e.v).toFixed(1)}`).join(' ');
      const firstPt = `${sx(0).toFixed(1)},${sy(entries[0].v).toFixed(1)}`;
      const lastPt = `${sx(entries.length-1).toFixed(1)},${sy(entries[entries.length-1].v).toFixed(1)}`;

      // Highlight current year
      const yr = isCompareMode ? null : getCurrentYear();
      let dotHtml = '';
      if(yr) {
        const idx = entries.findIndex(e => e.y === yr);
        if(idx >= 0) {
          const dx = sx(idx).toFixed(1), dy = sy(entries[idx].v).toFixed(1);
          dotHtml = `<circle cx="${dx}" cy="${dy}" r="3.5" fill="#4f8ef7"/>`;
        }
      }

      // Year labels (first and last only to save space)
      const labelFirst = `<text x="${sx(0)}" y="${H}" font-size="9" fill="#7a8ba3" text-anchor="middle">${entries[0].y}</text>`;
      const labelLast = `<text x="${sx(entries.length-1)}" y="${H}" font-size="9" fill="#7a8ba3" text-anchor="end">${entries[entries.length-1].y}</text>`;

      return `<svg class="sparkline-svg" viewBox="0 0 ${W} ${H+10}" xmlns="http://www.w3.org/2000/svg">
        <polyline points="${pts}" fill="none" stroke="#4f8ef7" stroke-width="1.8" stroke-linejoin="round"/>
        <circle cx="${firstPt.split(',')[0]}" cy="${firstPt.split(',')[1]}" r="2" fill="#4f8ef7"/>
        <circle cx="${lastPt.split(',')[0]}" cy="${lastPt.split(',')[1]}" r="2" fill="#4f8ef7"/>
        ${dotHtml}
        ${labelFirst}${labelLast}
      </svg>`;
    }

    // FIX 4: Build delta bar for compare mode
    function buildDeltaBar(code, variable) {
      const y1 = document.getElementById('yearFrom').value;
      const y2 = document.getElementById('yearTo').value;
      const v1 = getCountryValue(code, variable, y1);
      const v2 = getCountryValue(code, variable, y2);
      if(v1 === null || v2 === null) return '';

      const delta = v2 - v1;
      const pct = v1 !== 0 ? ((delta/Math.abs(v1))*100).toFixed(1) : '—';
      const isPos = delta >= 0;
      const color = isPos ? '#22c55e' : '#f87171';
      const sign = isPos ? '+' : '';
      const barWidth = Math.min(100, Math.abs(v1 !== 0 ? (delta/v1)*100 : 100));

      return `<div class="delta-bar-wrap">
        <div class="delta-bar-label">Změna ${y1} → ${y2}</div>
        <div class="delta-bar-track">
          <div class="delta-bar-fill" style="width:${Math.abs(barWidth)}%;background:${color};${isPos?'margin-left:0':'margin-left:auto'}"></div>
        </div>
        <div class="delta-val" style="color:${color}">${sign}${formatValue(delta,'delta')} <span style="color:var(--text-muted);font-weight:400;font-size:0.75rem">(${sign}${pct}%)</span></div>
      </div>`;
    }

    function buildTooltipContent(props, pinned) {
      const code = props.code;
      const variable = currentVariable;
      const data = WORLD_DATA[variable]?.[code];

      let html = `<div style="font-size:0.95rem;font-weight:600;margin-bottom:6px;padding-right:16px">${props.name}</div>`;

      if(!isCompareMode) {
        const yr = getCurrentYear();
        const val = getCountryValue(code, variable);
        html += `<div style="font-size:0.82rem;color:#7a8ba3;margin-bottom:2px">${getVariableLabel(variable)}</div>`;
        html += `<div style="font-size:1.1rem;font-weight:600;color:#e8edf5;margin-bottom:8px">${val !== null ? formatValue(val, variable) : '—'}`;
        if(yr) html += ` <span style="font-size:0.75rem;color:#7a8ba3;font-weight:400">(${yr})</span>`;
        html += '</div>';

        // Sparkline for time-series
        if(pinned && data && typeof data === 'object' && !Array.isArray(data)) {
          html += `<div class="sparkline-wrap">
            <div class="sparkline-label">Vývoj v čase</div>
            ${buildSparklineSVG(code, variable)}
          </div>`;
        } else if(!pinned) {
          html += `<div class="hint">🖱️ Klikněte pro graf vývoje v čase</div>`;
        }

      } else {
        // FIX 5+4: Compare mode shows delta properly
        const y1 = document.getElementById('yearFrom').value;
        const y2 = document.getElementById('yearTo').value;
        const v1 = getCountryValue(code, variable, y1);
        const v2 = getCountryValue(code, variable, y2);

        html += `<div style="font-size:0.82rem;color:#7a8ba3;margin-bottom:6px">${getVariableLabel(variable)}</div>`;
        html += `<table style="width:100%;font-size:0.82rem;border-collapse:collapse;margin-bottom:6px">`;
        if(v1 !== null) html += `<tr><td style="color:#7a8ba3;padding:2px 0">${y1}</td><td style="text-align:right;color:#e8edf5">${formatValue(v1,variable)}</td></tr>`;
        if(v2 !== null) html += `<tr><td style="color:#7a8ba3;padding:2px 0">${y2}</td><td style="text-align:right;color:#e8edf5">${formatValue(v2,variable)}</td></tr>`;
        html += '</table>';

        html += buildDeltaBar(code, variable);

        if(!pinned) html += `<div class="hint">🖱️ Klikněte pro detail</div>`;
      }

      return html;
    }

    // FIX 3 + FIX 6: Proper tooltip positioning using fixed coordinates
    function positionTooltip(event) {
      const tt = document.getElementById('tooltip');
      const pad = 14;
      // Get tooltip size (estimate if not yet visible)
      const rect = tt.getBoundingClientRect();
      const w = rect.width || 240;
      const h = rect.height || 180;

      let x = event.clientX + 16;
      let y = event.clientY + 16;

      if(x + w + pad > window.innerWidth) x = event.clientX - w - pad;
      if(y + h + pad > window.innerHeight) y = event.clientY - h - pad;
      x = Math.max(pad, x);
      y = Math.max(pad, y);

      tt.style.left = x + 'px';
      tt.style.top = y + 'px';
    }

    function showTooltipHover(event, props) {
      const tt = document.getElementById('tooltip');
      tt.innerHTML = `<button class="close-btn" onclick="unpinTooltip()" style="display:none">×</button>` + buildTooltipContent(props, false);
      tt.classList.remove('pinned');
      tt.classList.add('visible');
      positionTooltip(event);
    }

    function showTooltipPinned(event, props, keepPos) {
      tooltipPinned = true;
      tooltipCountryProps = props;
      const tt = document.getElementById('tooltip');
      tt.innerHTML = `<button class="close-btn" onclick="unpinTooltip()">×</button>` + buildTooltipContent(props, true);
      tt.classList.add('visible', 'pinned');
      if(!keepPos) positionTooltip(event);
    }

    function moveTooltip(event) {
      if(!tooltipPinned) positionTooltip(event);
    }

    function hideTooltip() {
      if(tooltipPinned) return;
      const tt = document.getElementById('tooltip');
      tt.classList.remove('visible');
    }

    function unpinTooltip() {
      tooltipPinned = false;
      tooltipCountryProps = null;
      const tt = document.getElementById('tooltip');
      tt.classList.remove('visible', 'pinned');
    }

    // Allow staying on tooltip without it disappearing
    document.getElementById('tooltip').addEventListener('mouseleave', function() {
      if(tooltipPinned) return;
      hideTooltip();
    });

    // ===== GLOBE MOUSE EVENTS =====
    function onGlobeMouseMove(e) {
      const container = document.getElementById('globeCanvas');
      const rect = container.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(globe);
      renderer.domElement.style.cursor = intersects.length > 0 ? 'pointer' : 'grab';
    }

    // ===== CONTROLS =====
    function switchView(v) {
      currentView = v;
      document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
      document.getElementById('globeCanvas').style.display = v === 'globe' ? 'block' : 'none';
      document.getElementById('mapContainer').style.display = v === 'map' ? 'block' : 'none';
      if(v === 'globe' && autoRotate) lastInteraction = Date.now();
      unpinTooltip();
    }

    function toggleAutoRotate() {
      autoRotate = document.getElementById('autoRotate').checked;
    }

    function toggleCompareMode() {
      isCompareMode = document.getElementById('compareMode').checked;
      document.getElementById('yearSelectors').style.display = isCompareMode ? 'flex' : 'none';
      document.getElementById('yearSingleRow').style.display = isCompareMode ? 'none' : 'flex';
      unpinTooltip();
      updateVisualization();
    }

    // ===== ANIMATION =====
    function animate() {
      animationId = requestAnimationFrame(animate);
      if(currentView === 'globe' && autoRotate && Date.now()-lastInteraction > CONFIG.autoRotatePauseTime) {
        globe.rotation.y += CONFIG.rotationSpeed;
      }
      if(currentView === 'globe') {
        controls.update();
        renderer.render(scene, camera);
      }
    }

    window.addEventListener('beforeunload', () => {
      if(animationId) cancelAnimationFrame(animationId);
      if(renderer) renderer.dispose();
    });
  </script>
</body>
</html>
